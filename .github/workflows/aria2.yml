name: Build aria2

on:
  workflow_dispatch:
    inputs:
      aria2_version:
        description: aria2 release version to build
        required: true
        type: string
        default: "1.37.0"
  workflow_call:
    inputs:
      aria2_version:
        description: aria2 release version to build
        required: false
        type: string
        default: "1.37.0"

permissions:
  contents: read

concurrency:
  group: aria2-${{ github.workflow }}-${{ github.ref }}-${{ inputs.aria2_version || '1.37.0' }}
  cancel-in-progress: true

env:
  ARIA2_VERSION: ${{ inputs.aria2_version || '1.37.0' }}

jobs:
  build:
    name: aria2-${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            os: windows-latest
            platform: windows
            msystem: CLANG64
            resource_name: aria2c.exe
            artifact_name: aria2-windows-x86_64
          - label: windows-aarch64
            os: windows-11-arm
            platform: windows
            msystem: CLANGARM64
            resource_name: aria2c.exe
            artifact_name: aria2-windows-aarch64
          - label: macos-x86_64
            os: macos-15-intel
            platform: macos
            resource_name: aria2c
            artifact_name: aria2-macos-x86_64
          - label: macos-aarch64
            os: macos-14
            platform: macos
            resource_name: aria2c
            artifact_name: aria2-macos-aarch64
          - label: linux-x86_64
            os: ubuntu-24.04
            platform: linux
            resource_name: aria2c
            artifact_name: aria2-linux-x86_64
          - label: linux-aarch64
            os: ubuntu-24.04-arm
            platform: linux
            resource_name: aria2c
            artifact_name: aria2-linux-aarch64

    steps:
      - name: Checkout Ferro
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            autopoint \
            build-essential \
            ca-certificates \
            gettext \
            git \
            libc-ares-dev \
            libexpat1-dev \
            libsqlite3-dev \
            libssl-dev \
            libtool \
            pkg-config \
            zlib1g-dev

      - name: Install macOS build dependencies
        if: matrix.platform == 'macos'
        run: |
          brew update
          brew install autoconf automake c-ares expat gettext libtool pkg-config sqlite zlib
          echo "$(brew --prefix gettext)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix libtool)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Setup MSYS2
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            git
            autoconf
            automake
            libtool
            gettext-devel
            pkgconf
          pacboy: >-
            toolchain:p
            c-ares:p
            expat:p
            sqlite3:p
            zlib:p

      - name: Build and verify aria2 (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euxo pipefail

          git clone \
            --branch "release-${ARIA2_VERSION}" \
            --depth 1 \
            https://github.com/aria2/aria2.git \
            build/aria2-src

          cd build/aria2-src
          git rev-parse --verify HEAD
          autoreconf -i

          configure_args=(
            --without-libssh2
            --without-libxml2
          )

          if [[ "${{ matrix.platform }}" == "linux" ]]; then
            configure_args+=(
              ARIA2_STATIC=yes
              --with-openssl
              --without-gnutls
              --without-libnettle
              --without-libgcrypt
            )
          elif [[ "${{ matrix.platform }}" == "macos" ]]; then
            export CPPFLAGS="-I$(brew --prefix c-ares)/include -I$(brew --prefix expat)/include -I$(brew --prefix sqlite)/include -I$(brew --prefix zlib)/include"
            export LDFLAGS="-L$(brew --prefix c-ares)/lib -L$(brew --prefix expat)/lib -L$(brew --prefix sqlite)/lib -L$(brew --prefix zlib)/lib"
            # macOS does not support fully static linking; use Apple's native
            # TLS (SecureTransport) via --with-appletls for HTTPS support.
            configure_args+=(
              --with-appletls
              --without-openssl
              --without-gnutls
              --without-libnettle
              --without-libgcrypt
            )
          fi

          ./configure "${configure_args[@]}"

          jobs="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 2)"
          make -j"${jobs}"

          artifact_dir="${GITHUB_WORKSPACE}/artifacts/${{ matrix.label }}"
          mkdir -p "${artifact_dir}"
          cp "src/aria2c" "${artifact_dir}/${{ matrix.resource_name }}"
          chmod 755 "${artifact_dir}/${{ matrix.resource_name }}"
          version_output="$("${artifact_dir}/${{ matrix.resource_name }}" --version)"
          printf '%s\n' "${version_output}"
          grep -F "aria2 version ${ARIA2_VERSION}" <<< "${version_output}"
          grep -F "Enabled Features" <<< "${version_output}"
          grep -F "BitTorrent" <<< "${version_output}"
          grep -F "HTTPS" <<< "${version_output}"
          grep -F "Metalink" <<< "${version_output}"

          # On macOS, verify the native AppleTLS backend is linked.
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            grep -F "AppleTLS" <<< "${version_output}"
          fi

          cd "${artifact_dir}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.resource_name }}" > SHA256SUMS
          else
            shasum -a 256 "${{ matrix.resource_name }}" > SHA256SUMS
          fi

      - name: Build and verify aria2 (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          set -euxo pipefail

          git clone \
            --branch "release-${ARIA2_VERSION}" \
            --depth 1 \
            https://github.com/aria2/aria2.git \
            build/aria2-src

          cd build/aria2-src
          git rev-parse --verify HEAD
          autoreconf -i

          configure_args=(
            --without-libssh2
            --without-libxml2
          )

          # Windows (MSYS2): static linking works; disable external TLS
          # backends so the MSYS2 schannel/WinTLS backend is used.
          configure_args+=(
            ARIA2_STATIC=yes
            --without-openssl
            --without-gnutls
            --without-libnettle
            --without-libgcrypt
          )

          ./configure "${configure_args[@]}"

          jobs="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.logicalcpu 2>/dev/null || echo 2)"
          make -j"${jobs}"

          artifact_dir="${GITHUB_WORKSPACE}/artifacts/${{ matrix.label }}"
          mkdir -p "${artifact_dir}"
          cp "src/aria2c.exe" "${artifact_dir}/${{ matrix.resource_name }}"
          chmod 755 "${artifact_dir}/${{ matrix.resource_name }}"
          version_output="$("${artifact_dir}/${{ matrix.resource_name }}" --version)"
          printf '%s\n' "${version_output}"
          grep -F "aria2 version ${ARIA2_VERSION}" <<< "${version_output}"
          grep -F "Enabled Features" <<< "${version_output}"
          grep -F "BitTorrent" <<< "${version_output}"
          grep -F "HTTPS" <<< "${version_output}"
          grep -F "Metalink" <<< "${version_output}"

          cd "${artifact_dir}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.resource_name }}" > SHA256SUMS
          else
            shasum -a 256 "${{ matrix.resource_name }}" > SHA256SUMS
          fi

      - name: Upload aria2-${{ matrix.label }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.label }}
          if-no-files-found: error
          retention-days: 30
