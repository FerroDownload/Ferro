name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm version is read automatically from package.json "packageManager".
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Type check
        run: pnpm exec tsc --noEmit -p tsconfig.json

      - name: Unit + smoke + integration tests
        run: pnpm test

  rust:
    name: Rust checks (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            os: windows-latest
          - label: macos-x86_64
            os: macos-15-intel
          - label: macos-aarch64
            os: macos-14
          - label: linux-x86_64
            os: ubuntu-latest
          - label: linux-aarch64
            os: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Provision aria2c
        run: node scripts/ensure-aria2c.mjs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rustfmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        working-directory: src-tauri
        run: cargo test

  desktop-build:
    name: Build desktop app (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - label: windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
          - label: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - label: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      # pnpm version is read automatically from package.json "packageManager".
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app
        run: pnpm tauri build --no-bundle --debug --target ${{ matrix.target }}
