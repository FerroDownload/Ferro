name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Gate the release on the full CI suite (frontend + cross-platform Rust).
  checks:
    name: Checks
    uses: ./.github/workflows/ci.yml

  build:
    name: Build windows-x86_64
    needs: checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm version is read automatically from package.json "packageManager".
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish signed updater artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          owner: FerroDownload
          repo: Ferro
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: Ferro ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseCommitish: ${{ github.sha }}
          releaseBody: See the attached signed installer and updater artifacts.
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          tauriScript: pnpm tauri
          args: --target x86_64-pc-windows-msvc
