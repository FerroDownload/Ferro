name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  # Gate the release on the full CI suite (frontend + cross-platform Rust).
  checks:
    name: Checks
    uses: ./.github/workflows/ci.yml

  build:
    name: Build ${{ matrix.label }}
    needs: checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - label: windows-aarch64
            os: windows-latest
            target: aarch64-pc-windows-msvc
          - label: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - label: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      # pnpm version is read automatically from package.json "packageManager".
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install zlib expat sqlite c-ares

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish signed updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          owner: FerroDownload
          repo: Ferro
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: Ferro ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseCommitish: ${{ github.sha }}
          releaseBody: See the attached signed installer and updater artifacts.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}
